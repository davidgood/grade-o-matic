# use this file to run the database and app together.
services:
  db:
    image: postgres:18
    container_name: grade-o-matic-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DATABASE_NAME}
      POSTGRES_USER: ${DATABASE_USER}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DATABASE_USER} -d ${DATABASE_NAME}" ]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    image: grade-o-matic:dev
    container_name: grade-o-matic-app
    restart: unless-stopped
    env_file:
      - .env
    environment:
      LISTEN_ADDRESS: 0.0.0.0
      LISTEN_PORT: 3030
      DATABASE_HOST: db
      DATABASE_PORT: 5432
      DATABASE_URL: postgres://${DATABASE_USER}:${DATABASE_PASSWORD}@db:5432/${DATABASE_NAME}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "3030:3030"

volumes:
  postgres_data:
