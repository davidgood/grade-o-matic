{% extends "layouts/base.html" %}
{% block content %}
<section class="rounded-xl border border-slate-200 bg-white p-5 shadow-sm">
    <header class="space-y-2 mb-3">
        <h1 class="text-3xl font-bold tracking-tight">
            {% if class %}Edit Class: {{ class.title }}{% else %}Create Class{% endif %}
        </h1>
        <p class="text-slate-600">Set class details and save when ready.</p>
    </header>

    {% if error %}
    <div class="rounded-md border border-slate-300 bg-slate-50 p-4 mb-3 text-sm text-slate-700">
        {{ error }}
    </div>
    {% endif %}

    <form method="post" action="{{ form_action }}" class="space-y-3">
        <input type="hidden" name="authenticity_token" value="{{ authenticity_token|safe }}" />
        <div class="space-y-2">
            <label for="title" class="text-sm font-medium text-slate-700">Title</label>
            <input id="title" name="title" type="text"
                   value="{% if class %}{{ class.title }}{% else %}{{ title_value }}{% endif %}" required
                   class="auth-input"/>
        </div>

        <div class="space-y-2">
            <label for="term" class="text-sm font-medium text-slate-700">Term</label>
            <input id="term" name="term" type="text"
                   value="{% if class %}{{ class.term }}{% else %}{{ term_value }}{% endif %}" class="auth-input"/>
        </div>

        <div class="space-y-2">
            <label for="description" class="text-sm font-medium text-slate-700">Description</label>
            <textarea id="description" name="description" rows="4" class="auth-input">{% if class and class.description %}{{ class.description }}{% else %}{{ description_value }}{% endif %}</textarea>
        </div>

        <div class="flex gap-2">
            <button type="submit"
                    class="rounded-md bg-slate-900 px-3 py-2 text-sm font-medium text-white hover:bg-slate-700">
                {% if class %}Update Class{% else %}Save Class{% endif %}
            </button>
            <a href="{% if class %}/ui/instructors/classes/{{ class.id }}{% else %}/ui/instructors{% endif %}"
               class="rounded-md border border-slate-300 px-3 py-2 text-sm font-medium hover:bg-slate-100">
                Cancel
            </a>
        </div>
    </form>
</section>
{% endblock %}
