<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{ title }}</title>
    <style>
      :root {
        --slate-50: #f8fafc;
        --slate-100: #f1f5f9;
        --slate-200: #e2e8f0;
        --slate-300: #cbd5e1;
        --slate-500: #64748b;
        --slate-600: #475569;
        --slate-700: #334155;
        --slate-900: #0f172a;
        --white: #ffffff;
      }

      * { box-sizing: border-box; }
      html, body { margin: 0; padding: 0; }
      body {
        font-family:
          "Plus Jakarta Sans",
          "Avenir Next",
          "Segoe UI",
          Roboto,
          "Helvetica Neue",
          Arial,
          sans-serif;
      }
      a { color: inherit; text-decoration: none; }
      table { border-collapse: collapse; width: 100%; }

      .min-h-screen { min-height: 100vh; }
      .mx-auto { margin-left: auto; margin-right: auto; }
      .max-w-4xl { max-width: 56rem; }
      .overflow-hidden { overflow: hidden; }
      .inline-block { display: inline-block; }
      .flex { display: flex; }
      .flex-wrap { flex-wrap: wrap; }
      .items-center { align-items: center; }
      .justify-between { justify-content: space-between; }

      .space-y-2 > * + * { margin-top: 0.5rem; }
      .space-y-3 > * + * { margin-top: 0.75rem; }
      .space-y-6 > * + * { margin-top: 1.5rem; }
      .gap-2 { gap: 0.5rem; }
      .gap-3 { gap: 0.75rem; }
      .mt-1 { margin-top: 0.25rem; }
      .mt-3 { margin-top: 0.75rem; }
      .mt-4 { margin-top: 1rem; }
      .mb-3 { margin-bottom: 0.75rem; }
      .px-2 { padding-left: 0.5rem; padding-right: 0.5rem; }
      .px-3 { padding-left: 0.75rem; padding-right: 0.75rem; }
      .px-4 { padding-left: 1rem; padding-right: 1rem; }
      .py-1 { padding-top: 0.25rem; padding-bottom: 0.25rem; }
      .py-2 { padding-top: 0.5rem; padding-bottom: 0.5rem; }
      .py-8 { padding-top: 2rem; padding-bottom: 2rem; }
      .p-4 { padding: 1rem; }
      .p-5 { padding: 1.25rem; }

      .rounded-md { border-radius: 0.375rem; }
      .rounded-lg { border-radius: 0.5rem; }
      .rounded-xl { border-radius: 0.75rem; }
      .rounded-full { border-radius: 9999px; }
      .border { border: 1px solid var(--slate-300); }
      .border-slate-200 { border-color: var(--slate-200); }
      .border-slate-300 { border-color: var(--slate-300); }
      .divide-y > * + * { border-top: 1px solid var(--slate-200); }
      .divide-slate-100 > * + * { border-top-color: var(--slate-100); }
      .divide-slate-200 > * + * { border-top-color: var(--slate-200); }

      .bg-white { background: var(--white); }
      .bg-slate-50 { background: var(--slate-50); }
      .bg-slate-100 { background: var(--slate-100); }
      .bg-slate-900 { background: var(--slate-900); }
      .text-white { color: var(--white); }
      .text-slate-500 { color: var(--slate-500); }
      .text-slate-600 { color: var(--slate-600); }
      .text-slate-700 { color: var(--slate-700); }
      .text-slate-900 { color: var(--slate-900); }
      .text-left { text-align: left; }
      .text-center { text-align: center; }
      .text-xs { font-size: 0.75rem; line-height: 1rem; }
      .text-sm { font-size: 0.875rem; line-height: 1.25rem; }
      .text-lg { font-size: 1.125rem; line-height: 1.75rem; }
      .text-xl { font-size: 1.25rem; line-height: 1.75rem; }
      .text-3xl { font-size: 1.875rem; line-height: 2.25rem; }
      .font-medium { font-weight: 500; }
      .font-semibold { font-weight: 600; }
      .font-bold { font-weight: 700; }
      .tracking-tight { letter-spacing: -0.025em; }
      .shadow-sm { box-shadow: 0 1px 2px rgba(15, 23, 42, 0.08); }
      .min-w-full { min-width: 100%; }

      .hover\:bg-slate-700:hover { background: var(--slate-700); }
      .hover\:bg-slate-100:hover { background: var(--slate-100); }
    </style>
    <script
      src="https://cdn.jsdelivr.net/npm/htmx.org@2.0.8/dist/htmx.min.js"
      integrity="sha384-/TgkGk7p307TH7EXJDuUlgG3Ce1UVolAOFopFekQkkXihi5u/6OCvVKyz1W+idaz"
      crossorigin="anonymous"
      defer
    ></script>
    <script
      src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.0/dist/cdn.min.js"
      integrity="sha384-O8NPfezTLQ/sgLfQYBJEnezJLlum9L6KOqHsfIWauzaFfD1TQSuvA4iUpgWGHeuZ"
      crossorigin="anonymous"
      defer
    ></script>
  </head>
  <body class="min-h-screen bg-slate-50 text-slate-900" hx-boost="true">
    <main class="mx-auto max-w-4xl space-y-6 px-4 py-8">
      {% block content %}{% endblock %}
    </main>
  </body>
</html>
