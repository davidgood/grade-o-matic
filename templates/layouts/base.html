<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>{{ title }}</title>
    <link rel="stylesheet" href="/assets/public/grade-o-matic.min.css"/>
    <script
            src="https://cdn.jsdelivr.net/npm/htmx.org@2.0.8/dist/htmx.min.js"
            integrity="sha384-/TgkGk7p307TH7EXJDuUlgG3Ce1UVolAOFopFekQkkXihi5u/6OCvVKyz1W+idaz"
            crossorigin="anonymous"
            defer
    ></script>
    <script
            src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.0/dist/cdn.min.js"
            integrity="sha384-O8NPfezTLQ/sgLfQYBJEnezJLlum9L6KOqHsfIWauzaFfD1TQSuvA4iUpgWGHeuZ"
            crossorigin="anonymous"
            defer
    ></script>
</head>
<body class="min-h-screen bg-slate-50 text-slate-900" hx-boost="true">
<header class="site-nav-wrap">
    <div class="site-nav-inner">
        <a href="/" class="site-brand">Grade-O-Matic</a>
        <nav class="site-nav-menu">
            <a href="/" class="site-nav-link">Home</a>

            <div class="site-nav-dropdown" x-data="{ open: false }">
                <button
                        type="button"
                        class="site-nav-link site-nav-toggle"
                        @click="open = !open"
                        @keydown.escape.window="open = false"
                        :aria-expanded="open.toString()"
                        aria-haspopup="true"
                >
                    Classroom
                </button>
                <div class="site-nav-panel" x-show="open" x-transition @click.outside="open = false">
                    <a href="/ui/assignments" class="site-nav-panel-item">Assignments</a>
                </div>
            </div>

            <div class="site-nav-dropdown" x-data="{ open: false }">
                <button
                        type="button"
                        class="site-nav-link site-nav-toggle"
                        @click="open = !open"
                        @keydown.escape.window="open = false"
                        :aria-expanded="open.toString()"
                        aria-haspopup="true"
                >
                    System
                </button>
                <div class="site-nav-panel" x-show="open" x-transition @click.outside="open = false">
                    <a href="/ui/admin/users" class="site-nav-panel-item">User Accounts</a>
                    <a href="/docs" class="site-nav-panel-item">API Docs</a>
                    <a href="/health" class="site-nav-panel-item">Health</a>
                </div>
            </div>

            <a href="/ui/logout" class="site-nav-link">Logout</a>
        </nav>
    </div>
</header>
<main class="mx-auto max-w-4xl space-y-6 px-4 py-8">
    {% block content %}{% endblock %}
</main>
</body>
</html>
