<div class="space-y-3">
  <div class="flex items-center justify-between">
    <h3 class="text-lg font-semibold">Assignment List</h3>
    <span class="rounded-full bg-slate-100 px-2 py-1 text-xs font-medium text-slate-700">0 items</span>
  </div>

  <div class="overflow-hidden rounded-lg border border-slate-200">
    <table class="min-w-full divide-y divide-slate-200 text-sm">
      <thead class="bg-slate-50">
        <tr>
          <th class="px-4 py-2 text-left font-medium text-slate-600">Title</th>
          <th class="px-4 py-2 text-left font-medium text-slate-600">Status</th>
          <th class="px-4 py-2 text-left font-medium text-slate-600">Due Date</th>
        </tr>
      </thead>
      <tbody class="divide-y divide-slate-100 bg-white">
        <tr>
          <td colspan="3" class="px-4 py-8 text-center text-slate-500">{{ message }}</td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
