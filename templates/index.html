{% extends "layouts/base.html" %}
{% block content %}
<header class="space-y-2">
  <h1 class="text-3xl font-bold tracking-tight">Grade-O-Matic</h1>
  <p class="text-slate-600">Server-rendered UI with HTMX, Alpine.js, and Minijinja templates.</p>
</header>

<section class="rounded-xl border border-slate-200 bg-white p-5 shadow-sm">
  <h2 class="mb-3 text-xl font-semibold">Pages</h2>
  <nav class="flex gap-3">
    <a class="rounded-md bg-slate-900 px-3 py-2 text-sm font-medium text-white hover:bg-slate-700" href="/">Home</a>
    <a class="rounded-md border border-slate-300 px-3 py-2 text-sm font-medium hover:bg-slate-100" href="/ui/assignments">Assignments</a>
  </nav>
</section>

<section class="rounded-xl border border-slate-200 bg-white p-5 shadow-sm" x-data="{ open: false }">
  <h2 class="mb-3 text-xl font-semibold">Alpine.js</h2>
  <button class="rounded-md bg-slate-900 px-3 py-2 text-sm font-medium text-white hover:bg-slate-700" @click="open = !open">
    Toggle Details
  </button>
  <p class="mt-3 text-slate-700" x-show="open" x-transition>This is client-side state only.</p>
</section>

<section class="rounded-xl border border-slate-200 bg-white p-5 shadow-sm">
  <h2 class="mb-3 text-xl font-semibold">HTMX Fragment</h2>
  <button
    class="rounded-md bg-slate-900 px-3 py-2 text-sm font-medium text-white hover:bg-slate-700"
    hx-get="/ui/fragments/server-time"
    hx-target="#server-time"
    hx-swap="innerHTML"
  >
    Load Server Time
  </button>
  <div id="server-time" class="mt-3 text-sm text-slate-700">Click the button to fetch a server partial.</div>
</section>
{% endblock %}
