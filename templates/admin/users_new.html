{% extends "layouts/base.html" %}
{% block content %}
<section class="rounded-xl border border-slate-200 bg-white p-5 shadow-sm">
  <header class="space-y-2 mb-3">
    <h1 class="text-3xl font-bold tracking-tight">Create User Account</h1>
    <p class="text-slate-600">Admin-only account provisioning.</p>
  </header>

  {% if error %}
  <div class="rounded-md border border-slate-300 bg-slate-50 p-4 mb-3 text-sm text-slate-700">
    {{ error }}
  </div>
  {% endif %}

  {% if success %}
  <div class="rounded-md border border-slate-300 bg-slate-50 p-4 mb-3 text-sm text-slate-700">
    {{ success }}
  </div>
  {% endif %}

  <form method="post" action="/ui/admin/users" class="space-y-3">
    <div class="space-y-2">
      <label for="username" class="text-sm font-medium text-slate-700">Username</label>
      <input id="username" name="username" type="text" value="{{ username }}" required class="auth-input" />
    </div>

    <div class="space-y-2">
      <label for="email" class="text-sm font-medium text-slate-700">Email</label>
      <input id="email" name="email" type="email" value="{{ email }}" required class="auth-input" />
    </div>

    <div class="space-y-2">
      <label for="role" class="text-sm font-medium text-slate-700">Role</label>
      <select id="role" name="role" class="auth-input" required>
        <option value="student" {% if role == "student" %}selected{% endif %}>Student</option>
        <option value="ta" {% if role == "ta" %}selected{% endif %}>TA</option>
        <option value="instructor" {% if role == "instructor" %}selected{% endif %}>Instructor</option>
        <option value="admin" {% if role == "admin" %}selected{% endif %}>Admin</option>
      </select>
    </div>

    <div class="space-y-2">
      <label for="password" class="text-sm font-medium text-slate-700">Temporary Password</label>
      <input id="password" name="password" type="password" minlength="8" required class="auth-input" />
    </div>

    <button type="submit" class="rounded-md bg-slate-900 px-3 py-2 text-sm font-medium text-white hover:bg-slate-700">
      Create Account
    </button>
  </form>
</section>
{% endblock %}
