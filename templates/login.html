{% extends "layouts/base.html" %}
{% block content %}
<section class="rounded-xl border border-slate-200 bg-white p-5 shadow-sm">
  <header class="space-y-2 mb-3">
    <h1 class="text-3xl font-bold tracking-tight">Sign In</h1>
    <p class="text-slate-600">Log in to access Grade-O-Matic.</p>
  </header>

  {% if error %}
  <div class="rounded-md border border-slate-300 bg-slate-50 p-4 mb-3 text-sm text-slate-700">
    {{ error }}
  </div>
  {% endif %}

  <form method="post" action="/ui/login" class="space-y-3">
    <input type="hidden" name="authenticity_token" value="{{ authenticity_token }}" />
    <div class="space-y-2">
      <label for="username" class="text-sm font-medium text-slate-700">Username</label>
      <input
        id="username"
        name="username"
        type="text"
        value="{{ username }}"
        required
        class="auth-input"
      />
    </div>
    <div class="space-y-2">
      <label for="password" class="text-sm font-medium text-slate-700">Password</label>
      <input
        id="password"
        name="password"
        type="password"
        required
        class="auth-input"
      />
    </div>
    <button type="submit" class="rounded-md bg-slate-900 px-3 py-2 text-sm font-medium text-white hover:bg-slate-700">
      Sign In
    </button>
  </form>
</section>
{% endblock %}
